<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aaron Blum</title>
    <meta name="description" content="Frontend developer based in Berlin. Design systems, React apps, and SVG animations." />
    <style>
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        z-index: 9999;
      }
      #loader svg { width: 120px; height: 120px; }
      #loader .bob { animation: bob 2s ease-in-out infinite alternate; }
      #loader .breathe { animation: breathe 1.2s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center bottom; }
      #loader .leg-l { animation: sway-l 1s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: top center; }
      #loader .leg-r { animation: sway-r 1.2s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: top center; }
      #loader .leg-m { animation: stretch 1s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: top center; }
      #loader .bubble { animation: rise 3s ease-in-out infinite; }
      #loader .bubble:nth-child(2) { animation-delay: 0.7s; animation-duration: 3.5s; }
      #loader .bubble:nth-child(3) { animation-delay: 1.4s; animation-duration: 2.8s; }
      @keyframes bob { from { transform: translateY(0); } to { transform: translateY(15px); } }
      @keyframes breathe { from { transform: scale(1, 1); } to { transform: scale(1.05, 0.97); } }
      @keyframes sway-l { from { transform: rotate(0deg); } to { transform: rotate(8deg); } }
      @keyframes sway-r { from { transform: rotate(0deg); } to { transform: rotate(-8deg); } }
      @keyframes stretch { from { transform: scaleY(1); } to { transform: scaleY(1.3); } }
      @keyframes rise { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-160px); opacity: 0; } }
    </style>
  </head>
  <body>
    <div id="loader">
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <circle class="bubble" cx="24" cy="140" r="5" fill="#7dd3fc" opacity="0" />
        <circle class="bubble" cx="120" cy="140" r="4" fill="#7dd3fc" opacity="0" />
        <circle class="bubble" cx="80" cy="140" r="3.5" fill="#7dd3fc" opacity="0" />
        <g transform="translate(40, 40)">
          <g class="bob">
            <path class="breathe" d="m8 22c0-11 9-20 20-20h6c11 0 20 9 20 20v20h-46z" fill="#ff78c7" />
            <circle cx="44" cy="24" fill="#595959" r="2" />
            <circle cx="17.4" cy="24" fill="#595959" r="2" />
            <g fill="none" stroke="#d650c7" stroke-linecap="round" stroke-width="2">
              <path class="leg-l" d="m17 41v12c0 3.3-2.7 6-6 6s-6-2.7-6-6" />
              <path class="leg-r" d="m45 41.5v12c0 3.3 2.7 6 6 6s6-2.7 6-6" />
              <path class="leg-m" d="m31 40v18m-7-24v18m14-18v18" stroke-linejoin="round" />
            </g>
          </g>
        </g>
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
